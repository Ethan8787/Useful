name: Useful
version: '6.0.0'
main: dev.ethan.useful.Main
api-version: '1.21'
authors: [ Ethan ]
description: Useful commands for your server. Made by Ethan.
depend:
  - LuckPerms
  - ProtocolLib
  - Citizens
softdepend:
  - PlaceholderAPI
  - packetevents
website: https://nul1.ddns.net
commands:
  useful:
    description: Help command
    usage: /<command>
  kms:
    description: Self-kill
    usage: /<command>
    permission: useful.default
    permission-message: Unknown command. Type \"/help\" for help.
  heal:
    description: Heal yourself
    usage: /<command>
    permission: useful.admin
    permission-message: Unknown command. Type \"/help\" for help.
  boom:
    description: Admin troll tool
    usage: /boom <Player>
    permission: useful.admin
    permission-message: Unknown command. Type "/help" for help.
  gms:
    description: Set Gamemode to Survival
    usage: /<command>
    permission: useful.admin
    permission-message: Unknown command. Type \"/help\" for help.
  gmc:
    description: Set Gamemode to Creative
    usage: /<command>
    permission-message: Unknown command. Type \"/help\" for help.
    permission: useful.admin
  gma:
    description: Set Gamemode to Adventure
    usage: /<command>
    permission: useful.admin
    permission-message: Unknown command. Type \"/help\" for help.
  gmsp:
    description: Set Gamemode to Spectator
    usage: /<command>
    permission-message: Unknown command. Type \"/help\" for help.
    permission: useful.admin
  sudo:
    description: Sudo
    usage: /sudo <player> <message || command>
    permission: useful.admin
    permission-message: Unknown command. Type "/help" for help.
  freeze:
    description: Freeze a player
    usage: /freeze
    permission: useful.admin
    permission-message: Unknown command. Type "/help" for help.
  unfreeze:
    description: Unfreeze a player
    usage: /unfreeze
    permission: useful.admin
    permission-message: Unknown command. Type "/help" for help.
  nick:
    description: Change display-name
    usage: /nick <nick>
    permission: useful.admin
    permission-message: Unknown command. Type "/help" for help.
  unnick:
    description: Reset display-name
    usage: /unnick
    permission: useful.admin
    permission-message: Unknown command. Type "/help" for help.
  msg:
    description: Send direct message to a player
    usage: /msg <player> <msg>
  r:
    description: Reply a direct message from a player
    usage: /r <msg>
  w:
    description: Send direct message to a player
    usage: /w <player> <msg>
  tell:
    description: Send direct message to a player
    usage: /tell <player> <msg>
  god:
    description: Enable god mode for a player
    usage: /god
    permission: useful.admin
    permission-message: Unknown command. Type "/help" for help.
  hat:
    description: Equip the item in your hand to your helmet slot
    usage: /hat
  dupe:
    description: Duplicate iten in hand
    usage: /dupe
    permission: useful.admin
    permission-message: Unknown command. Type "/help" for help.
  ips:
    description: Gets target's ips
    usage: /ips <Player>
    permission: useful.admin
    permission-message: Unknown command. Type "/help" for help.
  alts:
    description: Gets target's alt
    usage: /alts <Player>
    permission: useful.admin
    permission-message: Unknown command. Type "/help" for help.
  gun:
    description: Gives player a special feather
    usage: /gun
    permission: useful.admin
    permission-message: Unknown command. Type "/help" for help.
  botf:
    description: Spawn a NPC
    usage: /botf <name>
    permission: useful.admin
    permission-message: Unknown command. Type "/help" for help.
  bot:
    description: Spawn a NPC
    usage: /bot <name>
    permission: useful.admin
    permission-message: Unknown command. Type "/help" for help.
  removenpc:
    description: Despawn all NPC that you spawned
    usage: /removenpc
    permission: useful.admin
    permission-message: Unknown command. Type "/help" for help.
  crash:
    description: Throw Netty packets nuke on a player
    usage: /crash <Player>
    permission: useful.admin
    permission-message: Unknown command. Type "/help" for help.
  dmlisten:
    description: Toggle listening to direct messages.
    usage: /dmlisten [on|off]
    permission: useful.admin
    permission-message: You do not have permission to use this command.
  tpa:
    description: Request to teleport to another player.
    usage: /tpa <player>
    permission: useful.admin
    permission-message: Unknown command. Type "/help" for help.
  tpahere:
    description: Request another player to teleport to you.
    usage: /tpahere <player|all>
    permission: useful.admin
    permission-message: Unknown command. Type "/help" for help.
  tpaccept:
    description: Accept a teleport request.
    usage: /tpaccept
    permission: useful.admin
    permission-message: Unknown command. Type "/help" for help.
  tpdeny:
    description: Deny a teleport request.
    usage: /tpdeny
    permission: useful.admin
    permission-message: Unknown command. Type "/help" for help.
  fly:
    description: Enable fly for a player
    usage: /fly
    permission: useful.admin
    permission-message: Unknown command. Type "/help" for help.
  sethome:
    description: Set a home.
    usage: /sethome <name>
    permission: useful.admin
    permission-message: Unknown command. Type "/help" for help.
  homes:
    description: List your homes.
    usage: /homes
    permission: useful.admin
    permission-message: Unknown command. Type "/help" for help.
  block:
    description: Block a player
    usage: /block <player>
  unblock:
    description: Unblock a player
    usage: /unblock <player>
  blocklist:
    description: Shows a list with blocked player
    usage: /blocklist
  uuid:
    description: Get a player's UUID
    usage: /uuid <Player>
    permission: useful.admin
    permission-message: Unknown command. Type "/help" for help.
  home:
    description: Teleport to a home.
    usage: /home <name>
    permission: useful.admin
    permission-message: Unknown command. Type "/help" for help.
  delhome:
    description: Delete a home.
    usage: /delhome <name>
    permission: useful.admin
    permission-message: Unknown command. Type "/help" for help.
  world:
    description: Teleports to a world
    usage: /world <world>
    permission: useful.admin
    permission-message: Unknown command. Type "/help" for help.
permissions:
  useful.default:
    description: Default perms
    default: true
  useful.vip:
    description: VIP perms
    default: op
  useful.vipplus:
    description: VIP+ perms
    default: op
  useful.admin:
    description: Admin perms
    default: op
